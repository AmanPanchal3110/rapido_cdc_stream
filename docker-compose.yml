version: "3.8"

networks:
  kafka-spark-net:
    driver: bridge

services:
    postgres:
        image: postgres:16
        container_name: postgres_db
        command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
        networks:
            - kafka-spark-net
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=Aman
            - POSTGRES_PASSWORD=panchal@3110
            - POSTGRES_DB=rapido_db

    kafka:
        image: apache/kafka:latest
        container_name: kafka
        networks:
            - kafka-spark-net
        ports:
            - "9092:9092"
            - "29092:29092"
        environment:
            # ---- KRaft Core ----
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

            # ---- Listeners ----
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_EXTERNAL://localhost:29092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

            # ---- Replication (single node) ----
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

            # ---- Storage ----
            KAFKA_LOG_DIRS: /tmp/kraft-combined-logs


    # ─────────────────────────────────────────
    #  KAFKA UI
    # ─────────────────────────────────────────
    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        networks:
            - kafka-spark-net
        depends_on:
            - kafka
        ports:
            - "9090:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local-kafka
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    connect:
        image: debezium/connect:3.0.0.Final
        container_name: connect
        networks:
            - kafka-spark-net
        depends_on:
            - kafka
            - postgres
        ports:
            - "8083:8083"
        environment:
            BOOTSTRAP_SERVERS: kafka:9092
            GROUP_ID: 1
            CONFIG_STORAGE_TOPIC: connect_configs
            OFFSET_STORAGE_TOPIC: connect_offsets
            STATUS_STORAGE_TOPIC: connect_statuses
            # replication factor 1 kyunki single broker hai
            CONFIG_STORAGE_REPLICATION_FACTOR: 1
            OFFSET_STORAGE_REPLICATION_FACTOR: 1
            STATUS_STORAGE_REPLICATION_FACTOR: 1

    # ─────────────────────────────────────────
    #  DEBEZIUM UI (connector ko visually manage karne ke liye)
    # ─────────────────────────────────────────
    debezium-ui:
        image: debezium/debezium-ui:latest
        container_name: debezium-ui
        networks:
            - kafka-spark-net
        depends_on:
            - connect
        ports:
            - "8080:8080"
        environment:
            KAFKA_CONNECT_URIS: http://connect:8083

    spark-master:
        image: apache/spark:3.5.1
        container_name: spark-master
        hostname: spark-master
        networks:
            - kafka-spark-net
        env_file:           
            - .env
        command: >
            bash -c "
            /opt/spark/sbin/start-master.sh &&
            sleep 2 &&
            tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master*.out
            "
        ports:
            - "9091:8080"
            - "7077:7077"
        volumes:
            - ./apps:/opt/spark-apps
            - ./data:/opt/spark-data

    # ─────────────────────────────────────────
    #  SPARK WORKER 1
    # ─────────────────────────────────────────
    spark-worker-1:
        image: apache/spark:3.5.1
        container_name: spark-worker-1
        hostname: spark-worker-1
        networks:
            - kafka-spark-net
        env_file:           
            - .env
        command: >
            bash -c "
            /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g &&
            sleep 2 &&
            tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out
            "
        ports:
            - "8081:8081"
            - "4040:4040"
        depends_on:
            - spark-master
        volumes:
            - ./apps:/opt/spark-apps
            - ./data:/opt/spark-data

    # ─────────────────────────────────────────
    #  SPARK WORKER 2
    # ─────────────────────────────────────────
    spark-worker-2:
        image: apache/spark:3.5.1
        container_name: spark-worker-2
        hostname: spark-worker-2
        networks:
            - kafka-spark-net
        env_file:           
            - .env
        command: >
            bash -c "
            /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g &&
            sleep 2 &&
            tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out
            "
        ports:
            - "8082:8081"
        depends_on:
            - spark-master
        volumes:
            - ./apps:/opt/spark-apps
            - ./data:/opt/spark-data

    dbt:
        build:
            context: .
            dockerfile: Dockerfile.dbt
        container_name: dbt_core
        networks:
            - kafka-spark-net
        volumes:
            - ./dbt_project:/usr/app/dbt
            - ./dbt_project/.dbt:/root/.dbt
        working_dir: /usr/app/dbt
        environment:
            - DBT_PROFILES_DIR=/root/.dbt

    