version: "3.8"

networks:
  kafka-spark-net:
    driver: bridge

services:
    postgres:
        image: postgres:16
        container_name: postgres_db
        command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
        networks:
            - kafka-spark-net
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=Aman
            - POSTGRES_PASSWORD=panchal@3110
            - POSTGRES_DB=rapido_db