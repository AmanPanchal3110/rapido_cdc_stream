version: "3.8"

networks:
  kafka-spark-net:
    driver: bridge

x-airflow-common:
  &airflow-common
  # image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.5}
  build: .
  networks:
    - kafka-spark-net 
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:Panchal@postgres/airflow_db
    AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW__CORE__FERNET_KEY}'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
    postgres:
        image: postgres:16
        container_name: postgres_db
        command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
        networks:
            - kafka-spark-net
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=Aman
            - POSTGRES_PASSWORD=panchal@3110
            - POSTGRES_DB=rapido_db
        volumes:
            - postgres-db-volume:/var/lib/postgresql/data
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "Aman"]
            interval: 10s
            retries: 5
            start_period: 5s
        restart: always

    airflow-scheduler:
        <<: *airflow-common
        command: scheduler
        healthcheck:
            test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 30s
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

  # Airflow webserver
    airflow-apiserver:
        <<: *airflow-common
        command: api-server
        ports:
            - "8085:8080"
        healthcheck:
            test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 30s
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

  #airflow dag processor
    airflow-dag-processor:
        <<: *airflow-common
        command: dag-processor
        healthcheck:
            test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 30s
        restart: always
        depends_on:
            <<: *airflow-common-depends-on
            airflow-init:
                condition: service_completed_successfully

  # Airflow init (runs once to initialize the database and create admin user)
    airflow-init:
        <<: *airflow-common
        entrypoint: /bin/bash
        networks:
            - kafka-spark-net 
        # yamllint disable rule:line-length
        command:
            - -c
            - |
                if [[ -z "${AIRFLOW_UID}" ]]; then
                echo
                echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
                echo "If you are on Linux, you SHOULD follow the instructions below to set "
                echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
                echo "For other operating systems you can get rid of the warning with manually created .env file:"
                echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
                echo
                export AIRFLOW_UID=$$(id -u)
                fi
                one_meg=1048576
                mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
                cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
                disk_available=$$(df / | tail -1 | awk '{print $$4}')
                warning_resources="false"
                if (( mem_available < 4000 )) ; then
                echo
                echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
                echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
                echo
                warning_resources="true"
                fi
                if (( cpus_available < 2 )); then
                echo
                echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
                echo "At least 2 CPUs recommended. You have $${cpus_available}"
                echo
                warning_resources="true"
                fi
                if (( disk_available < one_meg * 10 )); then
                echo
                echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
                echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
                echo
                warning_resources="true"
                fi
                if [[ $${warning_resources} == "true" ]]; then
                echo
                echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
                echo "Please follow the instructions to increase amount of resources available:"
                echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
                echo
                fi
                echo
                echo "Creating missing opt dirs if missing:"
                echo
                mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
                echo
                echo "Airflow version:"
                /entrypoint airflow version
                echo
                echo "Files in shared volumes:"
                echo
                ls -la /opt/airflow/{logs,dags,plugins,config}
                echo
                echo "Running airflow config list to create default config file if missing."
                echo
                /entrypoint airflow config list >/dev/null
                echo
                echo "Files in shared volumes:"
                echo
                ls -la /opt/airflow/{logs,dags,plugins,config}
                echo
                echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
                echo
                chown -R "${AIRFLOW_UID}:0" /opt/airflow/
                echo
                echo "Change ownership of files in shared volumes to ${AIRFLOW_UID}:0"
                echo
                chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
                echo
                echo "Files in shared volumes:"
                echo
                ls -la /opt/airflow/{logs,dags,plugins,config}

        # yamllint enable rule:line-length
        environment:
            <<: *airflow-common-env
            _AIRFLOW_DB_MIGRATE: 'true'
            _AIRFLOW_WWW_USER_CREATE: 'true'
            _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
            _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
            _PIP_ADDITIONAL_REQUIREMENTS: ''
        user: "0:0"

    kafka:
        image: apache/kafka:latest
        container_name: kafka
        networks:
            - kafka-spark-net
        ports:
            - "9092:9092"
            - "29092:29092"
        environment:
            # ---- KRaft Core ----
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

            # ---- Listeners ----
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_EXTERNAL://localhost:29092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

            # ---- Replication (single node) ----
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

            # ---- Storage ----
            KAFKA_LOG_DIRS: /tmp/kraft-combined-logs


    # ─────────────────────────────────────────
    #  KAFKA UI
    # ─────────────────────────────────────────
    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        networks:
            - kafka-spark-net
        depends_on:
            - kafka
        ports:
            - "9090:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local-kafka
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    connect:
        image: debezium/connect:3.0.0.Final
        container_name: connect
        networks:
            - kafka-spark-net
        depends_on:
            - kafka
            - postgres
        ports:
            - "8083:8083"
        environment:
            BOOTSTRAP_SERVERS: kafka:9092
            GROUP_ID: 1
            CONFIG_STORAGE_TOPIC: connect_configs
            OFFSET_STORAGE_TOPIC: connect_offsets
            STATUS_STORAGE_TOPIC: connect_statuses
            # replication factor 1 kyunki single broker hai
            CONFIG_STORAGE_REPLICATION_FACTOR: 1
            OFFSET_STORAGE_REPLICATION_FACTOR: 1
            STATUS_STORAGE_REPLICATION_FACTOR: 1

    # ─────────────────────────────────────────
    #  DEBEZIUM UI (connector ko visually manage karne ke liye)
    # ─────────────────────────────────────────
    debezium-ui:
        image: debezium/debezium-ui:latest
        container_name: debezium-ui
        networks:
            - kafka-spark-net
        depends_on:
            - connect
        ports:
            - "8080:8080"
        environment:
            KAFKA_CONNECT_URIS: http://connect:8083

    spark-master:
        image: apache/spark:3.5.1
        container_name: spark-master
        hostname: spark-master
        networks:
            - kafka-spark-net
        env_file:           
            - .env
        command: >
            bash -c "
            /opt/spark/sbin/start-master.sh &&
            sleep 2 &&
            tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master*.out
            "
        ports:
            - "9091:8080"
            - "7077:7077"
        volumes:
            - ./apps:/opt/spark-apps
            - ./data:/opt/spark-data

    # ─────────────────────────────────────────
    #  SPARK WORKER 1
    # ─────────────────────────────────────────
    spark-worker-1:
        image: apache/spark:3.5.1
        container_name: spark-worker-1
        hostname: spark-worker-1
        networks:
            - kafka-spark-net
        env_file:           
            - .env
        command: >
            bash -c "
            /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g &&
            sleep 2 &&
            tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out
            "
        ports:
            - "8081:8081"
            - "4040:4040"
        depends_on:
            - spark-master
        volumes:
            - ./apps:/opt/spark-apps
            - ./data:/opt/spark-data
    # ─────────────────────────────────────────
    #  SPARK WORKER 2
    # ─────────────────────────────────────────
    spark-worker-2:
        image: apache/spark:3.5.1
        container_name: spark-worker-2
        hostname: spark-worker-2
        networks:
            - kafka-spark-net
        env_file:           
            - .env
        command: >
            bash -c "
            /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g &&
            sleep 2 &&
            tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out
            "
        ports:
            - "8082:8081"
        depends_on:
            - spark-master
        volumes:
            - ./apps:/opt/spark-apps
            - ./data:/opt/spark-data

    dbt:
        build:
            context: .
            dockerfile: Dockerfile.dbt
        container_name: dbt_core
        networks:
            - kafka-spark-net
        volumes:
            - ./dbt_project:/usr/app/dbt
            - ./dbt_project/.dbt:/root/.dbt
        working_dir: /usr/app/dbt
        environment:
            - DBT_PROFILES_DIR=/root/.dbt
        depends_on:
            - airflow-apiserver

volumes:
  postgres-db-volume:

    